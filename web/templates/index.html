{% extends "base.html" %}
{% block title %}操作台 · 文档盖章系统{% endblock %}

{% block head %}
<style>
  .stamp-panel {
    text-align: center;
    padding: 2.5rem 1rem;
  }
  .stamp-btn {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: linear-gradient(145deg, #457b9d, #1d3557);
    border: none;
    color: #fff;
    font-size: 1.15rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(29,53,87,.4);
    transition: transform .15s, box-shadow .15s;
    line-height: 1.4;
  }
  .stamp-btn:hover:not(:disabled) {
    transform: scale(1.05);
    box-shadow: 0 10px 28px rgba(29,53,87,.5);
  }
  .stamp-btn:active:not(:disabled) { transform: scale(.97); }
  .stamp-btn:disabled { background: #adb5bd; cursor: not-allowed; box-shadow: none; }

  .status-box {
    margin-top: 2rem;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .result-card {
    border-radius: 10px;
    padding: 1.2rem 2rem;
    max-width: 480px;
    width: 100%;
    text-align: left;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  .result-card.approved { background: #d4edda; border-left: 5px solid #28a745; }
  .result-card.rejected { background: #f8d7da; border-left: 5px solid #dc3545; }
  .result-card.review   { background: #fff3cd; border-left: 5px solid #ffc107; }
  .result-card.error    { background: #f8d7da; border-left: 5px solid #6c757d; }
  .result-card h3 { font-size: 1rem; margin-bottom: .5rem; }
  .result-card ul { padding-left: 1.2rem; font-size: .88rem; margin-top: .4rem; }
  .result-card .fields { font-size: .82rem; color: #495057; margin-top: .5rem; }

  .spinner {
    display: inline-block;
    width: 36px; height: 36px;
    border: 4px solid #dee2e6;
    border-top-color: #457b9d;
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .step-guide {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .4rem;
    font-size: .8rem;
    color: #6c757d;
  }
  .step-num {
    width: 32px; height: 32px;
    background: #e9ecef;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    color: #495057;
  }
</style>
{% endblock %}

{% block content %}
<div class="card">
  <h2>操作说明</h2>
  <div class="step-guide">
    <div class="step"><div class="step-num">1</div><span>登录账号</span></div>
    <div class="step"><div class="step-num">2</div><span>放入文件至对齐槽</span></div>
    <div class="step"><div class="step-num">3</div><span>点击扫描按钮</span></div>
    <div class="step"><div class="step-num">4</div><span>等待验证结果</span></div>
    <div class="step"><div class="step-num">5</div><span>取走文件</span></div>
  </div>
</div>

<div class="card stamp-panel">
  <button class="stamp-btn" id="stampBtn" onclick="triggerStamp()">
    扫描<br>&amp;<br>审核
  </button>

  <div class="status-box" id="statusBox">
    <span style="color:#adb5bd;font-size:.9rem;">点击按钮开始</span>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function triggerStamp() {
  const btn = document.getElementById('stampBtn');
  const box = document.getElementById('statusBox');

  btn.disabled = true;
  box.innerHTML = '<div class="spinner"></div>';

  try {
    const resp = await fetch('/stamp', { method: 'POST' });
    const data = await resp.json();
    renderResult(data, box);
  } catch(e) {
    box.innerHTML = resultHtml('error', '网络错误', [e.message], {});
  } finally {
    btn.disabled = false;
  }
}

function renderResult(data, box) {
  const { status, fields = {}, errors = [], warnings = [], message } = data;
  let cls, title, msgs;

  if (status === 'approved') {
    cls = 'approved'; title = '审核通过 · 已盖章';
    msgs = [];
  } else if (status === 'rejected') {
    cls = 'rejected'; title = '审核拒绝';
    msgs = errors;
  } else if (status === 'pending_review') {
    cls = 'review'; title = '已推入人工复审队列';
    msgs = warnings;
  } else {
    cls = 'error'; title = '系统错误';
    msgs = [message || '未知错误'];
  }

  const errHtml = msgs.length
    ? '<ul>' + msgs.map(m => `<li>${m}</li>`).join('') + '</ul>'
    : '';

  const fKeys = Object.entries(fields)
    .filter(([,v]) => v)
    .map(([k,v]) => `<b>${k}</b>：${v}`)
    .join(' &nbsp;|&nbsp; ');

  box.innerHTML = `
    <div class="result-card ${cls}">
      <h3>${title}</h3>
      ${errHtml}
      ${fKeys ? `<div class="fields">${fKeys}</div>` : ''}
    </div>`;
}
</script>
{% endblock %}
