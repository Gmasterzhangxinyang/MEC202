{% extends "base.html" %}
{% block title %}操作台 · 文档盖章系统{% endblock %}

{% block head %}
<style>
  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:1.4rem; }
  .stat-card { background:#fff; border-radius:10px; padding:1.2rem 1.4rem; box-shadow:0 2px 10px rgba(0,0,0,.07); text-align:center; }
  .stat-card .num { font-size:2rem; font-weight:800; margin-bottom:.2rem; }
  .stat-card .lbl { font-size:.78rem; color:#6c757d; }
  .stat-card.s-total   .num { color:#1d3557; }
  .stat-card.s-approved .num { color:#2a9d8f; }
  .stat-card.s-rejected .num { color:#e63946; }
  .stat-card.s-pending  .num { color:#ffc107; }

  .stamp-panel { text-align:center; padding:2rem 1rem 2.5rem; }
  .stamp-wrap { position:relative; display:inline-block; }
  .stamp-btn {
    width:170px; height:170px;
    border-radius:50%;
    background:linear-gradient(145deg,#457b9d,#1d3557);
    border:none; color:#fff;
    font-size:1.1rem; font-weight:700;
    cursor:pointer; line-height:1.5;
    box-shadow:0 6px 24px rgba(29,53,87,.4);
    transition:transform .15s,box-shadow .15s;
  }
  .stamp-btn:hover:not(:disabled) { transform:scale(1.06); box-shadow:0 10px 30px rgba(29,53,87,.5); }
  .stamp-btn:active:not(:disabled) { transform:scale(.97); }
  .stamp-btn:disabled { background:#adb5bd; cursor:not-allowed; box-shadow:none; }

  .status-box { margin-top:1.8rem; min-height:80px; display:flex; align-items:center; justify-content:center; }
  .result-card {
    border-radius:10px; padding:1.1rem 1.6rem;
    max-width:500px; width:100%; text-align:left;
    animation:fadeIn .3s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  .result-card.approved { background:#d4edda; border-left:5px solid #28a745; }
  .result-card.rejected { background:#f8d7da; border-left:5px solid #dc3545; }
  .result-card.pending_review { background:#fff3cd; border-left:5px solid #ffc107; }
  .result-card h3 { font-size:.98rem; margin-bottom:.4rem; }
  .result-card ul { padding-left:1.2rem; font-size:.85rem; margin-top:.35rem; line-height:1.7; }
  .result-card .fields-row { font-size:.8rem; color:#495057; margin-top:.5rem; }

  .spinner {
    width:40px; height:40px;
    border:4px solid #e9ecef; border-top-color:#457b9d;
    border-radius:50%;
    animation:spin .7s linear infinite;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .spin-label { color:#6c757d; font-size:.85rem; margin-left:1rem; }

  .steps { display:flex; justify-content:center; gap:2rem; margin-bottom:1.8rem; flex-wrap:wrap; }
  .step { display:flex; flex-direction:column; align-items:center; gap:.35rem; font-size:.78rem; color:#6c757d; }
  .step-n { width:30px; height:30px; background:#e9ecef; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.85rem; color:#495057; }
  .step-n.done { background:#2a9d8f; color:#fff; }

  @media(max-width:600px) {
    .stats-row { grid-template-columns:repeat(2,1fr); }
  }
</style>
{% endblock %}

{% block content %}
<!-- 统计卡片 -->
<div class="stats-row" id="statsRow">
  <div class="stat-card s-total"><div class="num" id="st-total">-</div><div class="lbl">总处理量</div></div>
  <div class="stat-card s-approved"><div class="num" id="st-approved">-</div><div class="lbl">审核通过</div></div>
  <div class="stat-card s-rejected"><div class="num" id="st-rejected">-</div><div class="lbl">审核拒绝</div></div>
  <div class="stat-card s-pending"><div class="num" id="st-pending">-</div><div class="lbl">待人工复审</div></div>
</div>

<!-- 操作说明 -->
<div class="card">
  <h2>操作步骤</h2>
  <div class="steps">
    <div class="step"><div class="step-n done">1</div><span>登录账号</span></div>
    <div class="step"><div class="step-n done">2</div><span>放入文件</span></div>
    <div class="step"><div class="step-n" id="step3">3</div><span>点击扫描</span></div>
    <div class="step"><div class="step-n" id="step4">4</div><span>等待结果</span></div>
    <div class="step"><div class="step-n" id="step5">5</div><span>取走文件</span></div>
  </div>
</div>

<!-- 盖章操作台 -->
<div class="card stamp-panel">
  <div class="stamp-wrap">
    <button class="stamp-btn" id="stampBtn" onclick="triggerStamp()">
      扫描<br>&amp;<br>审核
    </button>
  </div>

  <div class="status-box" id="statusBox">
    <span style="color:#adb5bd;font-size:.88rem;">将文件放入对齐槽后，点击按钮开始</span>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// 加载统计数据
async function loadStats() {
  const r = await fetch('/stats');
  const d = await r.json();
  document.getElementById('st-total').textContent    = d.total;
  document.getElementById('st-approved').textContent = d.approved;
  document.getElementById('st-rejected').textContent = d.rejected;
  document.getElementById('st-pending').textContent  = d.pending;
}
loadStats();

async function triggerStamp() {
  const btn = document.getElementById('stampBtn');
  const box = document.getElementById('statusBox');
  btn.disabled = true;
  document.getElementById('step3').classList.add('done');
  box.innerHTML = '<div class="spinner"></div><span class="spin-label">正在扫描文件 / OCR识别 / 验证中…</span>';

  try {
    const resp = await fetch('/stamp', { method:'POST' });
    const data = await resp.json();
    document.getElementById('step4').classList.add('done');
    renderResult(data, box);
    if (data.status === 'approved') document.getElementById('step5').classList.add('done');
    loadStats();
  } catch(e) {
    box.innerHTML = errCard('系统错误：' + e.message);
  } finally {
    btn.disabled = false;
  }
}

function renderResult(d, box) {
  const { status, fields={}, errors=[], warnings=[] } = d;
  const icons = { approved:'✅', rejected:'❌', pending_review:'⏳' };
  const titles = { approved:'审核通过，印章已盖下', rejected:'审核被拒绝', pending_review:'已转入人工复审队列' };

  const msgs = status === 'rejected' ? errors : warnings;
  const listHtml = msgs.length
    ? '<ul>' + msgs.map(m=>`<li>${m}</li>`).join('') + '</ul>' : '';

  const fHtml = Object.entries(fields).filter(([,v])=>v)
    .map(([k,v])=>`<b>${k}</b>：${v}`).join('&emsp;|&emsp;');

  box.innerHTML = `
    <div class="result-card ${status}">
      <h3>${icons[status]||''} ${titles[status]||status}</h3>
      ${listHtml}
      ${fHtml ? `<div class="fields-row">${fHtml}</div>` : ''}
    </div>`;
}

function errCard(msg) {
  return `<div class="result-card rejected"><h3>❌ ${msg}</h3></div>`;
}
</script>
{% endblock %}
