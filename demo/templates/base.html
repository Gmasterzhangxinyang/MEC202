<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}文档盖章系统{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #1d3557;
      --blue: #457b9d;
      --teal: #2a9d8f;
      --red:  #e63946;
      --bg:   #f0f2f5;
    }
    body { font-family: -apple-system,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:#1a1a1a; min-height:100vh; }
    nav {
      background: var(--navy);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 2rem;
      height:56px;
      box-shadow:0 2px 8px rgba(0,0,0,.3);
      position:sticky; top:0; z-index:100;
    }
    nav .brand { font-size:1.05rem; font-weight:700; letter-spacing:.5px; }
    nav .nav-links a { color:#a8dadc; text-decoration:none; margin-left:1.4rem; font-size:.88rem; transition:color .2s; }
    nav .nav-links a:hover { color:#fff; }
    nav .user-pill {
      background:rgba(255,255,255,.1);
      border-radius:20px;
      padding:.25rem .9rem;
      font-size:.8rem;
      color:#a8dadc;
    }
    .container { max-width:980px; margin:2rem auto; padding:0 1rem; }
    .card { background:#fff; border-radius:12px; box-shadow:0 2px 14px rgba(0,0,0,.07); padding:1.8rem; margin-bottom:1.4rem; }
    .card h2 { font-size:1rem; color:var(--navy); margin-bottom:1rem; border-bottom:2px solid #f0f0f0; padding-bottom:.6rem; }
    .btn { display:inline-block; padding:.55rem 1.4rem; border:none; border-radius:6px; cursor:pointer; font-size:.9rem; font-weight:600; transition:opacity .15s,transform .1s; }
    .btn:hover { opacity:.85; transform:translateY(-1px); }
    .btn:active { transform:translateY(0); }
    .btn-primary   { background:var(--blue);  color:#fff; }
    .btn-success   { background:var(--teal);  color:#fff; }
    .btn-danger    { background:var(--red);   color:#fff; }
    .btn-secondary { background:#adb5bd; color:#fff; }
    .badge { display:inline-block; padding:.22rem .55rem; border-radius:4px; font-size:.75rem; font-weight:700; }
    .badge-success { background:#d4edda; color:#155724; }
    .badge-danger  { background:#f8d7da; color:#721c24; }
    .badge-warning { background:#fff3cd; color:#856404; }
    .badge-info    { background:#d1ecf1; color:#0c5460; }
    table { width:100%; border-collapse:collapse; font-size:.86rem; }
    th { background:#f8f9fa; padding:.6rem .8rem; text-align:left; border-bottom:2px solid #e9ecef; color:#495057; }
    td { padding:.55rem .8rem; border-bottom:1px solid #f4f4f4; }
    tr:hover td { background:#fafafa; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
{% if session.get('username') %}
<nav>
  <span class="brand">&#128221; 文档盖章机器人</span>
  <div class="nav-links">
    <a href="/">操作台</a>
    <a href="/logs">审计日志</a>
    {% if session.get('role') in ('reviewer','admin') %}<a href="/review">人工复审</a>{% endif %}
    <a href="/logout">退出</a>
  </div>
  <span class="user-pill">{{ session.get('username') }} · {{ session.get('role') }}</span>
</nav>
{% endif %}
<div class="container">{% block content %}{% endblock %}</div>
{% block scripts %}{% endblock %}
</body>
</html>
